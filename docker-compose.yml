services:
  app:
    build: .
    container_name: top-api-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT}:8000"
    depends_on:
      mongodb:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  mongodb:
    image: mongo:7
    container_name: top-api-mongodb
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: top-api-minio
    restart: unless-stopped
    env_file: .env
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: top-api-minio-init
    restart: "no"
    entrypoint: /bin/sh
    env_file: .env
    depends_on:
      minio:
        condition: service_started
    command:
      [
        "-ec",
        "until mc alias set local http://$$MINIO_ENDPOINT:$$MINIO_PORT \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; do sleep 1; done; mc mb --ignore-existing local/\"$$MINIO_BUCKET\"; mc anonymous set download local/\"$$MINIO_BUCKET\""
      ]

volumes:
  mongodb_data:
  minio_data:
