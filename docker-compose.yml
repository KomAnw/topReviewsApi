services:
  app:
    build: .
    container_name: top-api-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: top-api-mongodb
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_DB: ${MONGO_DB:-top-api}
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
