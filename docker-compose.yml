services:
  app:
    build: .
    container_name: top-api-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
    ports:
      - "${PORT:-8000}:8000"
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: top-api-mongodb
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
      MONGO_DB: ${MONGO_DB:-top-api}
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: top-api-minio
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

volumes:
  mongodb_data:
  minio_data:
